services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongo:27017
      DATABASE_NAME: cbva
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - mongo

volumes:
  mongo_data:
